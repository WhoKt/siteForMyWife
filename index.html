<!doctype html>
<html lang="ru">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>С годовщиной!!!</title>

        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

        <link
            href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800&display=swap"
            rel="stylesheet"
        />

        <link rel="stylesheet" href="style.css" />
    </head>

    <body>
        <div class="bg-circle bg1"></div>
        <div class="bg-circle bg2"></div>

        <section class="hero reveal">
            <h1>С годовщиной любимая!!!</h1>

            <p class="subtitle">Сделал такие вот приколюхи для тебя</p>

            <img src="наша-ава.jpg" class="hero-image" alt="" />
            <p>мы кста</p>
        </section>

        <section class="year-card reveal">
            <div class="year-title">1 ГОД ВМЕСТЕ</div>

            <div class="year-line"></div>

            <p>Уже прошёл целый год с 30.05.2025</p>
            <p>(да-да уже годик прошёл)</p>
        </section>

        <section class="timer-section reveal">
            <h2>Вместе уже</h2>

            <div class="timer">
                <div class="timer-box">
                    <span id="days">0</span>
                    <small>дней</small>
                </div>

                <div class="timer-box">
                    <span id="hours">0</span>
                    <small>часов</small>
                </div>

                <div class="timer-box">
                    <span id="minutes">0</span>
                    <small>минут</small>
                </div>

                <div class="timer-box">
                    <span id="seconds">0</span>
                    <small>секунд</small>
                </div>
            </div>
        </section>

        <section class="gallery-section reveal">
            <h2>Просто смешные фота</h2>

            <div class="gallery">
                <div class="photo photo-large">
                    <img src="photo1.jpg" alt="" data-index="0" />
                </div>

                <div class="photo">
                    <img src="photo2.jpg" alt="" data-index="1" />
                </div>

                <div class="photo">
                    <img src="photo3.jpg" alt="" data-index="2" />
                </div>

                <div class="photo photo-wide">
                    <img src="photo5.jpg" alt="" data-index="3" />
                </div>

                <div class="photo">
                    <img src="photo6.jpg" alt="" data-index="4" />
                </div>

                <div class="photo photo-tall">
                    <img src="photo7.jpg" alt="" data-index="5" />
                </div>

                <div class="photo">
                    <img src="photo8.jpg" alt="" data-index="6" />
                </div>

                <div class="photo">
                    <img src="photo4.jpg" alt="" data-index="7" />
                </div>

                <div class="photo">
                    <img src="photo9.jpg" alt="" data-index="8" />
                </div>

                <div class="photo photo-wide">
                    <img src="photo10.jpg" alt="" data-index="9" />
                </div>
            </div>
        </section>

        <section class="secret-section reveal">
            <h2>Нажми кнопки</h2>
            <p>там прикольно будет</p>

            <div class="secret-buttons">
                <button onclick="showSecret(0)">1</button>
                <button onclick="showSecret(1)">2</button>
                <button onclick="showSecret(2)">3</button>
            </div>

            <div class="secret-box" id="secretBox">Нажми любую кнопку</div>
        </section>

        <div class="lightbox" id="lightbox">
            <img id="lightboxImg" src="" alt="" />
            <div id="lightboxText"></div>
        </div>

        <script src="script.js"></script>
    </body>
</html>
